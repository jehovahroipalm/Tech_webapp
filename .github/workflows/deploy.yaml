name : Deploy to Github pages
on:
  push:
    branches:
      - main

 permissions:
   contents: write
   pages: write
   id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

      -name: connect pages
      uses: actions/configure-pages@v4

      -name: upload artifact
      uses: actions/upload-pages-artifact@v4
      with:
       path: ./
      -name: deploy to Github pages
      uses: actions/deploy-pages@v4



